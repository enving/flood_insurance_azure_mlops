name: HyperDrive Sweep → Quality Gate → Register

# ── Trigger ────────────────────────────────────────────────────────
on:
  push:
    branches: [main]
    paths:
      - "src/train.py"
      - "src/sweep.yaml"
      - "src/quality_gate.py"
  workflow_dispatch:            # manuell startbar (Button in GitHub UI)

# ── Job ────────────────────────────────────────────────────────────
jobs:
  sweep-and-register:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Code auschecken ───────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Azure Login ───────────────────────────────────────────
      #    AZURE_CREDENTIALS = Service Principal JSON aus GitHub Secrets
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # ── 3. Azure ML CLI installieren ────────────────────────────
      - name: Install Azure ML CLI
        run: az extension add -n ml --yes

      # ── 4. Subscription ID aus CLI holen ────────────────────────
      #    Wird für quality_gate.py (Azure ML SDK) benötigt
      - name: Get Subscription ID
        id: sub
        run: echo "id=$(az account show --query id -o tsv)" >> $GITHUB_OUTPUT

      # ── 5. HyperDrive Sweep starten ─────────────────────────────
      #    sweep.yaml definiert: Search Space, Bandit Early Termination,
      #    max 20 Trials (4 parallel), Timeout 90min
      - name: Submit HyperDrive Sweep
        id: sweep
        run: |
          SWEEP_NAME=$(az ml job create \
            --file src/sweep.yaml \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --workspace-name ${{ secrets.AZURE_ML_WORKSPACE }} \
            --query "name" -o tsv)
          echo "sweep_name=$SWEEP_NAME" >> $GITHUB_OUTPUT
          echo "🔍 HyperDrive Sweep gestartet: $SWEEP_NAME"

      # ── 6. Warten bis Sweep fertig ──────────────────────────────
      #    Streamt Logs aller Child-Runs — Ctrl+C bricht Pipeline ab
      - name: Wait for Sweep
        run: |
          az ml job stream \
            --name ${{ steps.sweep.outputs.sweep_name }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --workspace-name ${{ secrets.AZURE_ML_WORKSPACE }}

      # ── 7. Sweep-Status prüfen ──────────────────────────────────
      - name: Check Sweep Status
        run: |
          STATUS=$(az ml job show \
            --name ${{ steps.sweep.outputs.sweep_name }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --workspace-name ${{ secrets.AZURE_ML_WORKSPACE }} \
            --query "status" -o tsv)
          echo "Sweep Status: $STATUS"
          if [ "$STATUS" != "Completed" ]; then
            echo "❌ Sweep fehlgeschlagen oder abgebrochen: $STATUS"
            exit 1
          fi
          echo "✅ Sweep abgeschlossen"

      # ── 8. Quality Gate ─────────────────────────────────────────
      #    Installiert Azure ML SDK, prüft besten Run auf:
      #      • test_r2 >= 0.80   (Qualitätsschwelle)
      #      • overfit_gap <= 0.10 (Overfitting-Check)
      #    Schreibt best_child_id + test_r2 nach GITHUB_OUTPUT
      - name: Quality Gate
        id: gate
        env:
          AZURE_SUBSCRIPTION_ID: ${{ steps.sub.outputs.id }}
        run: |
          pip install azure-ai-ml mlflow --quiet
          python src/quality_gate.py \
            --sweep-name ${{ steps.sweep.outputs.sweep_name }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --workspace ${{ secrets.AZURE_ML_WORKSPACE }}

      # ── 9. Bestes Modell registrieren ───────────────────────────
      #    Nur wenn Quality Gate bestanden (Exit 0)
      #    Tags: stage=staging (nicht direkt production!)
      #          test_r2, git_sha, sweep_job für Traceability
      - name: Register Best Model
        run: |
          az ml model create \
            --name hochwasser-scoring-model \
            --path "azureml://jobs/${{ steps.gate.outputs.best_child_id }}/outputs/model_dir" \
            --type custom_model \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --workspace-name ${{ secrets.AZURE_ML_WORKSPACE }} \
            --tags \
              stage=staging \
              git_sha=${{ github.sha }} \
              test_r2=${{ steps.gate.outputs.test_r2 }} \
              sweep_job=${{ steps.sweep.outputs.sweep_name }}
          echo "📦 Bestes Modell registriert"
          echo "   R²=${{ steps.gate.outputs.test_r2 }}"
          echo "   Child-Job: ${{ steps.gate.outputs.best_child_id }}"
          echo "   Tag: stage=staging (→ manuell auf production promoten)"
